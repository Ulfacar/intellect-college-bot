# STAGING 1 overlay — публичный supervised-пилот за Caddy (TLS) на отдельном VPS.
# НЕ production. Накладывается НА базовый docker-compose.yml:
#
#   STAGING_ENV_FILE=/etc/intellect/staging.env \
#   docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d --build
#
# Безопасность портов (owner §1): базовый compose публикует app как "8000:8000" — здесь мы
# ЯВНО сбрасываем это (`ports: !reset []`), поэтому app наружу НЕ смотрит; снаружи доступен
# только Caddy (80/443). Postgres и Redis портов не публикуют (их нет в базовом файле).
# Все сервисы общаются по именам во внутренней сети Compose.
#
# Требуется Docker Compose >= 2.24.4 (теги слияния `!reset` / `!override`).
# Здесь стоит v2-совместимый синтаксис; проверено на Compose v2.24+.

services:
  app:
    # Все переменные — из защищённого server env (вне git). Локально для `config`/валидации
    # можно указать STAGING_ENV_FILE=./.env.staging.example (только плейсхолдеры, без секретов).
    env_file:
      - ${STAGING_ENV_FILE:-/etc/intellect/staging.env}
    # Сбрасываем ${VAR:-default}-блок базового файла: на staging источник истины — env_file.
    environment: !reset null
    # НЕ публикуем порт приложения наружу (owner §1/§3) — до app ходит только Caddy.
    ports: !reset []
    expose:
      - "8000"
    # Корректные proxy-заголовки от Caddy для точного client-IP (login throttling per IP) и
    # логов. `forwarded-allow-ips=*` здесь безопасно: порт app НЕ опубликован (см. `!reset []`),
    # поэтому единственный, кто может достучаться до uvicorn — Caddy во внутренней сети,
    # который сам ставит X-Forwarded-* (trusted_proxies в Caddyfile). Граница доверия =
    # внутренняя docker-сеть, а не произвольный внешний источник.
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--proxy-headers", "--forwarded-allow-ips", "*"]
    # Readiness как healthcheck (owner §3): app «здоров» только когда БД готова и схема есть.
    healthcheck: !override
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health/ready').status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  db:
    env_file:
      - ${STAGING_ENV_FILE:-/etc/intellect/staging.env}
    # Заменяем базовый environment целиком: фиксированные (не секретные) имя пользователя и
    # БД staging; POSTGRES_PASSWORD приходит из env_file (в environment его нет намеренно).
    environment: !override
      POSTGRES_USER: college
      POSTGRES_DB: college_staging
    healthcheck: !override
      test: ["CMD-SHELL", "pg_isready -U college -d college_staging"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    # Персистентность (owner §4): AOF с fsync каждую секунду; том redisdata уже в базовом файле.
    command: !override ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]

  caddy:
    image: caddy:2.11.4   # закреплённый полный patch-тег (owner §7); директива request_body требует Caddy >= 2.10.0
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    # Caddy reads STAGING_DOMAIN / ACME_EMAIL / ADMIN_BASIC_USER / ADMIN_BASIC_HASH straight
    # from the server env file (the Caddyfile uses Caddy's own {$VAR} placeholders). This
    # avoids compose `${...}` interpolation of the bcrypt hash — the hash's `$` segments are
    # written `$$`-escaped in the env file, which compose unescapes to a literal `$` when
    # loading into the container, so no "variable ... is not set" warning is emitted.
    env_file:
      - ${STAGING_ENV_FILE:-/etc/intellect/staging.env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data       # сертификаты Let's Encrypt (persistent, owner §7)
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
