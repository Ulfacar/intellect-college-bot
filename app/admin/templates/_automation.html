{# Тумблеры фич (вкл/выкл) + описания. Свапается целиком при клике (HTMX). #}
<div id="automation" class="panel">
  <h2>Автоматизация</h2>
  {% for f in flags %}
  <div class="toggle-row"{% if not loop.first %} style="margin-top:16px;border-top:1px solid var(--border);padding-top:16px"{% endif %}>
    <label class="switch" title="Включить/выключить">
      <input type="checkbox" {{ 'checked' if f.on else '' }}
             hx-post="/admin/flags/{{ f.key }}" hx-target="#automation" hx-swap="outerHTML"
             hx-vals='{"on": "{{ 0 if f.on else 1 }}"}'>
      <span class="slider"></span>
    </label>
    <div class="toggle-text">
      <div class="t-title">{{ f.title }} —
        <span class="state {{ 'on' if f.on else 'off' }}">{{ 'ВКЛ' if f.on else 'ВЫКЛ' }}</span>
      </div>
      <div class="t-desc">{{ f.desc }}{% if f.note %}<br><span style="color:var(--warm)">{{ f.note }}</span>{% endif %}</div>
    </div>
  </div>
  {% endfor %}
</div>
