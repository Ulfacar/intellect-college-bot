<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Intellect College — вход</title>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#F1F5F9; --surface:#FFFFFF; --border:#E2E8F0; --text:#0F172A;
            --muted:#64748B; --accent:#2563EB; --accent-2:#1D4ED8; --hot:#DC2626; }
    * { box-sizing: border-box; }
    body { margin:0; height:100vh; display:grid; place-items:center; background:var(--bg);
           color:var(--text); font-family:'Fira Sans', system-ui, sans-serif; }
    .card { width:340px; background:var(--surface); border:1px solid var(--border);
            border-radius:16px; padding:28px; box-shadow:0 10px 30px rgba(15,23,42,.08); }
    .logo { width:44px; height:44px; border-radius:12px; margin:0 auto 14px;
            background:linear-gradient(135deg,#2563EB,#059669); display:grid; place-items:center;
            color:#fff; font-weight:800; font-size:20px; }
    h1 { font-size:18px; text-align:center; margin:0 0 4px; }
    .sub { text-align:center; color:var(--muted); font-size:13px; margin:0 0 20px; }
    label { display:block; font-size:12px; color:var(--muted); margin:12px 0 6px; }
    input { width:100%; padding:11px 12px; background:#F8FAFC; border:1px solid var(--border);
            border-radius:10px; color:var(--text); font-size:14px; }
    input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(37,99,235,.12); }
    button { width:100%; margin-top:18px; padding:12px; border:0; border-radius:10px;
             background:var(--accent); color:#fff; font-weight:700; font-size:14px; cursor:pointer;
             transition:background 180ms; }
    button:hover { background:var(--accent-2); }
    .err { margin-top:14px; color:var(--hot); font-size:13px; text-align:center; }
    .demo { margin-top:20px; padding-top:16px; border-top:1px dashed var(--border); }
    .demo-l { text-align:center; color:var(--muted); font-size:12px; margin-bottom:10px; }
    .demo-btns { display:flex; flex-direction:column; gap:8px; }
    .demo-btns button { margin:0; padding:10px; background:#F8FAFC; color:var(--text);
                        border:1px solid var(--border); font-weight:600; }
    .demo-btns button:hover { background:#EEF2FF; border-color:var(--accent); }
  </style>
</head>
<body>
  <form class="card" method="post" action="/admin/login">
    <div class="logo">I</div>
    <h1>Intellect College — панель</h1>
    <p class="sub">Войдите под своим логином</p>
    <label for="login">Логин</label>
    <input id="login" name="login" autocomplete="username" autofocus>
    <label for="password">Пароль</label>
    <input id="password" name="password" type="password" autocomplete="current-password">
    <button type="submit">Войти</button>
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
  </form>
  {% if demo_managers %}
  <div class="card demo" style="margin-top:14px">
    <div class="demo-l">⚡ Быстрый вход (демо)</div>
    <div class="demo-btns">
      {% for m in demo_managers %}
      <form method="post" action="/admin/login/demo">
        <input type="hidden" name="login" value="{{ m.login }}">
        <button type="submit">Войти как {{ m.name }}</button>
      </form>
      {% endfor %}
    </div>
  </div>
  {% endif %}
</body>
</html>
